land_acknowledgement: "Je reconnais que l'Université de Montréal et Mila sont situées sur le territoire traditionnel non cédé de la Nation Kanien'kehá:ka, un lieu qui a longtemps servi de lieu de rencontre et d'échange entre les nations. J'honore et respecte l'histoire, les langues et les cultures des peuples Haudenosaunee, Anishinaabeg, et de tous les peuples des Premières Nations, Inuits et Métis dont la présence continue d'enrichir notre communauté."
