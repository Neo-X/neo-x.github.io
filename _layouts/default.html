<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: " en" }}">

{%- include head.html -%}

<body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
        <div class="wrapper">
            {{ content }}
        </div>
    </main>

    {%- include footer.html -%}

    <script>
    document.addEventListener('click', function(e) {
      var btn = e.target;
      if (btn.classList.contains('btn-abstract')) {
        var entry = btn.closest('.pub-entry');
        if (entry) {
          var panel = entry.querySelector('.pub-abstract');
          if (panel) panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }
      }
      if (btn.classList.contains('btn-bibtex')) {
        var entry = btn.closest('.pub-entry');
        if (entry) {
          var panel = entry.querySelector('.pub-bibtex');
          if (panel) panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }
      }
    });
    </script>

</body>

</html>
